name: Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run build

      - name: Zip extension
        run: |
          cd dist
          zip -r ../tabstash-${{ github.ref_name }}.zip .

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, getting all commits."
            CHANGES=$(git log --pretty=format:"* %s (%h)" --no-merges)
          else
            echo "Previous tag: $PREV_TAG"
            CHANGES=$(git log --pretty=format:"* %s (%h)" $PREV_TAG..${{ github.ref_name }} --no-merges)
          fi
          
          # Escape changes for output
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: tabstash-${{ github.ref_name }}.zip
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.CHANGES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
