name: Release Extension
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Release {0}', github.event.inputs.version) || github.event.head_commit.message }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set Release Tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run build

      - name: Zip extension
        run: |
          cd dist
          zip -r ../tabstash-${{ steps.vars.outputs.tag }}.zip .

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ steps.vars.outputs.tag }}^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, getting all commits."
            CHANGES=$(git log --pretty=format:"* %s (%h)" --no-merges)
          else
            echo "Previous tag: $PREV_TAG"
            CHANGES=$(git log --pretty=format:"* %s (%h)" $PREV_TAG..${{ steps.vars.outputs.tag }} --no-merges)
          fi
          
          # Escape changes for output
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: TabStash ${{ steps.vars.outputs.tag }}
          files: tabstash-${{ steps.vars.outputs.tag }}.zip
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.CHANGES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
